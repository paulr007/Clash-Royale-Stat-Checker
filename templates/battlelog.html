<!DOCTYPE html>
<html>

<head>
    <title>Battle Log</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Supermercado+One&family=Open+Sans:wght@400;700&display=swap');

        body {
            font-family: 'Open Sans', sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background-color: #0f0f1a;
            color: white;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Supermercado One', cursive;
            color: #f4a800;
            text-align: center;
            font-size: 2.5em;
            text-shadow: 0 0 20px #f4a80088;
            margin-bottom: 30px;
        }

        h2 {
            color: #f4a800;
            font-family: 'Supermercado One', cursive;
            margin-bottom: 15px;
        }

        .opponents {
            display: block;
        }

        .match_description {
            background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
            border: 2px solid #f4a800;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 0 20px #f4a80044;
        }

        .info {
            text-align: center;
        }

        .info-value {
            font-size: 2em;
            font-weight: bold;
        }

        .info-label {
            font-size: 0.85em;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .deck {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
            border: 2px solid #f4a800;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px #f4a80044;
            margin-bottom: 30px;
        }

        .deck img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .deck img:hover {
            transform: scale(1.1);
            z-index: 1;
        }

        .buttons {
            display: inline;
        }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #f4a800, #e09000);
            color: #0f0f1a;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <h1>⚔️ Battle Log</h1>

    <h2>🃏 Last Matches</h2>
    <div class="opponents">
        {% for opponent in opponents %}
        <div class="match_description">
            <div class="info">
                <div class="info-value">
                    {{ opponent.name }}
                </div>
                <div class="info-label">
                    Opponent
                </div>
            </div>
        </div>
        <div class="deck">
            {% for card in opponent.deck %}
            <img src="{{ card.image }}" alt="{{ card.name }}" title="{{ card.name }}">
            {% endfor %}
        </div>
        {% endfor %}
    </div>

    <div class="buttons">
        <a href="/stats?tag={{ tag | urlencode }}" class="btn">← Zurück</a>
        <a href="/battlelog?tag={{ tag | urlencode }}" class="btn">Battle-Log</a>
    </div>
</body>

</html>
